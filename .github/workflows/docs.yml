# Build and deploy the docs site (HTML + PDFs) to GitHub Pages.
# Mirrors `just docs` locally: gen-docs.py -> pandoc/typst PDFs -> zensical.
name: Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: extractions/setup-just@v4
      - uses: typst-community/setup-typst@v5
      - uses: pandoc/actions/setup@v1
      - name: Install cheatsheet fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-inter fonts-jetbrains-mono
      - run: pip install zensical
      # Build via the justfile so CI can't drift from `just docs` (pages,
      # cheatsheets and the handbook concat all live there). On Ubuntu the
      # nerd font dir is absent, so cheatsheet keycaps fall back to the
      # fonts-jetbrains-mono family installed above.
      - name: Build PDFs + cheatsheets
        run: just cheat_font_path=/usr/share/fonts/truetype/jetbrains-mono docs-pdf docs-cheatsheets
      - run: zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - uses: actions/deploy-pages@v5
        id: deployment

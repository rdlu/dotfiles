# Zensical (https://zensical.org) config for the docs site.
# Build with `just docs-html` (runs zensical via uvx, nothing to install).

[project]
site_name = "rdlu's dotfiles"
site_description = "Dotfiles for two CachyOS notebooks — stow + justfile, niri/waybar/fish/tmux. Generated shortcut references and setup guides."
site_author = "Rodrigo Dlugokenski"
site_url = "https://rdlu.github.io/dotfiles/"
repo_url = "https://github.com/rdlu/dotfiles"
repo_name = "rdlu/dotfiles"

nav = [
  { "Home" = "index.md" },
  { "Setup guide" = "setup.md" },
  { "Justfile reference" = "justfile.md" },
  { "Shortcuts" = [
    { "tmux" = "shortcuts/tmux.md" },
    { "niri" = "shortcuts/niri.md" },
  ] },
  { "wl-kbptr" = "wl-kbptr.md" },
]

[project.theme]
language = "en"
features = [
  "navigation.sections",
  "navigation.top",
  "search.suggest",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/rdlu/dotfiles"

[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

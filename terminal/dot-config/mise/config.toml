[alias]

[settings]
experimental = true
disable_tools = ["python"]

[settings.pipx]
uvx = true

[settings.npm]
bun = true

# Shared tools (both machines). Host-specific tools live in the per-host
# overlay: hosts/<hostname>/dot-config/mise/conf.d/<hostname>.toml
[tools]
# Languages — kept in mise (version-pinned) alongside the pacman copies.
# This dual install is intentional: pacman = system floor, mise = project pin.
erlang = "29.0.1"
elixir = "1.20.0-otp-29"
ruby = "4.0"
zig = "0.15.2"
gleam = "1.14.0"

# CLI/dev tools that are NOT in the pacman repos (AUR-only or fetched direct),
# so mise is the right manager for them.
"cargo:gittype" = "latest"
"cargo:jiq" = "latest"
"cargo:scooter" = "latest"
# fff-mcp: backs the `fff` MCP server in Claude Code. Not on crates.io, so use
# the github backend to pull the prebuilt release binary (the musl static-pie
# asset). Replaces a hand-placed ~/.local/bin/fff-mcp.
"github:dmtrKovalenko/fff" = { version = "latest", bin = "fff-mcp", matching_regex = "fff-mcp-.*-musl$" }
"pipx:llm" = "latest"
"pipx:xxh-xxh" = "latest"
"pipx:epy-reader" = "latest"

# Removed from mise — now installed via pacman (see justfile fish-shell recipe):
#   bottom, zellij, jaq, jnv, ttyper, monolith, jujutsu(jj), lazyjj, lazydocker, duckdb

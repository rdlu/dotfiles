#Prefix is Ctrl-a
set -g prefix C-a
bind C-a last-window
unbind C-b

# Nested tmux: F12 toggles "OFF" mode. In OFF mode the local prefix is
# unset and the key table swaps to `off`, so all keys (including C-a and
# C-b) pass straight through to the focused pane -- a remote tmux over
# SSH receives its own prefix unchanged. The status bar turns red as a
# reminder that keystrokes are going to the remote session.
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=colour245,bg=colour52" \;\
    set window-status-current-style "fg=colour232,bold,bg=colour160" \;\
    set window-status-current-format " #I: #W [REMOTE] " \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    set -u window-status-current-style \;\
    set -u window-status-current-format \;\
    refresh-client -S

set -sg escape-time 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#Resize to smaller only if client is watching
setw -g aggressive-resize on

#Mouse works as expected
# set -g mouse-utf8 on
set -g mouse on

#Useless in TMUX, weird behavior
setw -g monitor-activity off
setw -g monitor-silence 0
set-window-option -g bell-action other

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g history-limit 50000

# y and p as in vim
bind Escape copy-mode
unbind p
bind p paste-buffer
set -g @yank_selection_mouse 'clipboard'

bind r source-file ${HOME}/.tmux.conf \; display-message "source-file reloaded"

# Status bar styling and content.
set -g status-bg colour4
set -g status-fg white
set -g status-left "#[fg=black][#S]"
set-window-option -g status-left-style fg=colour8
set-window-option -g status-left-style bg=yellow
set -g status-left-length 80
set -g status-interval 2
set -g status-right-length 80

set-window-option -g status-right "#[fg=yellow][#H]#[fg=white][%H:%M %d-%b-%y][#{cpu_bg_color}#{cpu_percentage}]"

# Window tab background
set-window-option -g window-status-current-style bg=colour13
set-window-option -g window-status-current-style fg=black
set-window-option -g window-status-format " #I: #W "
set-window-option -g window-status-current-format " #I: #W "
# Highlight active window
set-window-option -g window-status-current-style bg=colour13


# set -g xterm-keys on
# set -s extended-keys on
# set -as terminal-features 'xterm*:extkeys'
# set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,gnome*:RGB"

# List of plugins
# Supports `github_username/repo` or full git repo URLs
set -g @tpm_plugins '            \
  tmux-plugins/tpm               \
  omerxx/catppuccin-tmux         \
  tmux-plugins/tmux-sensible     \
  tmux-plugins/tmux-copycat      \
  tmux-plugins/tmux-yank         \
  tmux-plugins/tmux-resurrect    \
  tmux-plugins/tmux-open         \
  tmux-plugins/tmux-pain-control \
  tmux-plugins/tmux-logging      \
  tmux-plugins/tmux-cpu          \
  tmux-plugins/tmux-sessionist   \
  laktak/extrakto                \
  tmux-plugins/tmux-continuum    \
  sainnhe/tmux-fzf               \
  fcsonline/tmux-thumbs          \
  omerxx/tmux-sessionx'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '0'
set -g @open-S 'https://www.duckduckgo.com/'

set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-x-path '~/Projects'

# catppuccin related config
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_date_time "%Y-%m-%d %H:%M"
set -g @catppuccin_status_modules_left "session"

set -g @catppuccin_status_modules_right "directory user host date_time"

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_current_middle_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_window_default_text "#W" # use "#W" for application instead of directory
set -g @catppuccin_window_current_text "#W" # use "#W" for application instead of directory
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_window_current_fill "number"


set -g @thumbs-osc52 1
set -g @thumbs-command 'echo -n {} | wl-copy && tmux display-message \"Copied {}\"'


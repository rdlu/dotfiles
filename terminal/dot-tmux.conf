# Rebinding Clear Screen
unbind C-l
bind C-l send-keys 'C-l'

# unbind C-h
# bind C-h send-keys 'C-w'
#
# Initializes TMUX plugin manager.
# Keep this line at the very bottom of tmux.conf.
run-shell '~/.tmux/plugins/tpm/tpm'
run-shell '~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux'

# # Rebinding the pane splitting bindings
# unbind % # Remove default bindings since we're replacing
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Toggle mouse on with prefix m
bind M \
  set -g mouse on \;\
  display 'Mouse: ON'

# Toggle mouse off with prefix M
bind m \
  set -g mouse off \;\
  display 'Mouse: OFF'

# passthrough for wezterm
# set -g allow-passthrough on

# Bind url capture
bind-key u capture-pane \; save-buffer /tmp/tmux-buffer \; new-window -n "urlview" 'fish -c "urlview < /tmp/tmux-buffer"'

# Ctrl-t (no prefix): one "find files" key everywhere. Panes that handle files
# themselves — fish (its Ctrl-t inserts paths) and editors (nvim/vim/hx, whose
# Ctrl-t / pickers we must NOT shadow) — get the key passed straight through;
# every other TUI/REPL (claude, python, psql, …) gets a popup that injects the
# chosen paths into the pane via send-keys (pick-files).
# NB: the only root (-n) binding here; everything else is prefix-gated.
bind -n C-t if-shell "case '#{pane_current_command}' in fish|nvim|vim|hx) exit 0 ;; *) exit 1 ;; esac" \
  'send-keys C-t' \
  'display-popup -E -h 70% -w 70% "/home/rdlu/.local/bin/pick-files"'

# Popup terminal bound to prefix + t
bind C-t display-popup -E -h 70% -w 70% -d "#{pane_current_path}"

# Categorized manifest of ALL intentionally-installed pacman/AUR packages.
# Every package name lives here — justfile recipes pull their list from a
# category via `just _pkgs <category>` instead of hardcoding names.
#
# Source: the justfile recipe lists plus a pacman.log analysis on daisy
# (2026-06-06) — packages explicitly installed AFTER the day-0 CachyOS
# install. Individual nerd fonts are omitted: the `nerd-fonts` group in
# the niri-wm category pulls all of them.
#
#   just pkg-install              # install every category (paru -S --needed)
#   just pkg-install music-media  # install one category
#   just pkg-categories           # list categories with package counts
#   just pkg-drift                # show installed-but-not-captured packages
#
# Format: top-level keys are categories, values are flat package lists.
# (Parsed by awk in the justfile — keep it to `category:` + `  - pkg` lines.)

# --- Categories consumed by specific justfile recipes -----------------------

